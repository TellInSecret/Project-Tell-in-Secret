<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicMsg 다운로드</title>
    <link rel="stylesheet" href="css/site.css">
    <style>
        body { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { font-size: 3em; margin-bottom: 10px; }
        
        /* 빠른 다운로드 카드 */
        .download-card { background: var(--bg3); border-radius: var(--radius); padding: 30px; box-shadow: var(--shadow); display: inline-block; width: 100%; max-width: 400px; margin-bottom: 40px; text-align: center; border: 1px solid var(--border); }
        .primary-btn { display: block; padding: 18px; background-color: var(--accent); color: white; text-decoration: none; border-radius: var(--radius-sm); font-weight: bold; font-size: 1.1em; margin-top: 15px; transition: background 0.2s; }
        .primary-btn:hover { background-color: var(--accent2); color: white; }

        /* 아코디언 스타일 */
        .version-section { width: 100%; max-width: 600px; margin-bottom: 15px; background: var(--bg3); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
        .accordion-header { width: 100%; padding: 20px; background: rgba(0,0,0,0.2); border: none; color: var(--text); text-align: left; font-size: 1.2em; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .accordion-content { padding: 20px; display: none; }
        
        /* OS 그룹 스타일 */
        .os-group { margin-bottom: 20px; text-align: left; }
        .os-group h3 { color: var(--accent2); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        .download-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .btn-download { background: var(--accent); color: white; padding: 8px 16px; border-radius: var(--radius-sm); text-decoration: none; font-size: 0.9em; }
        .btn-download:hover { background: var(--accent2); color: white; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>TicMsg 다운로드</h1>
        <p>간편하게 시작하세요.</p>
    </div>
    
    <div class="download-card">
        <p id="os-message">운영체제를 확인 중...</p>
        <div id="android-warning" style="display:none; color: var(--danger); font-weight: bold; margin-top: 10px;">
            ⚠️ 현재 안드로이드는 지원하지 않습니다.
        </div>
        <a id="primary-download" href="#" class="primary-btn">설치 파일 다운로드</a>
    </div>

    <!-- 버전별 아코디언 -->
    <div class="version-section">
        <button class="accordion-header" onclick="toggleAccordion(this)">
            <span>버전 0.1.0</span>
            <span>▼</span>
        </button>
        <div class="accordion-content" style="display: block;">
            
            <div class="os-group">
                <h3>Windows</h3>
                <div class="download-item">
                    <span>Windows x64</span>
                    <a href="downloadfiles/0.1.0/ticmsg_0.1.0_x64_en-US.msi" class="btn-download">MSI 다운로드</a>
                </div>
            </div>

            <div class="os-group">
                <h3>macOS</h3>
                <div class="download-item">
                    <span>macOS (Universal)</span>
                    <a href="downloadfiles/0.1.0/ticmsg_0.1.0_mac.dmg" class="btn-download">DMG 다운로드</a>
                </div>
            </div>

            <div class="os-group">
                <h3>Linux</h3>
                <div class="download-item">
                    <span>Ubuntu 22</span>
                    <a href="downloadfiles/0.1.0/ticmsg_0.1.0_ubuntu22.deb" class="btn-download">DEB</a>
                </div>
                <div class="download-item">
                    <span>Ubuntu 24</span>
                    <a href="downloadfiles/0.1.0/ticmsg_0.1.0_ubuntu24.deb" class="btn-download">DEB</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function toggleAccordion(btn) {
            const content = btn.nextElementSibling;
            content.style.display = (content.style.display === "block") ? "none" : "block";
            btn.querySelector('span:last-child').innerText = (content.style.display === "block") ? "▲" : "▼";
        }

        function autoDetect() {
            const ua = navigator.userAgent.toLowerCase();
            const btn = document.getElementById('primary-download');
            const msg = document.getElementById('os-message');
            const androidWarning = document.getElementById('android-warning');
            
            let os = '알 수 없음';
            let link = '#';

            if (ua.indexOf('android') !== -1) {
                os = 'Android';
                msg.innerText = "안드로이드 기기로 접속하셨습니다.";
                androidWarning.style.display = 'block';
                btn.style.display = 'none'; // 다운로드 버튼 숨김
            } else if (ua.indexOf('win') !== -1) { 
                os = 'Windows'; 
                link = 'downloadfiles/0.1.0/ticmsg_0.1.0_x64_en-US.msi';
                msg.innerText = os + "용 설치 파일이 준비되었습니다.";
                btn.innerText = os + "용 TicMsg 다운로드";
                btn.href = link;
            } else if (ua.indexOf('mac') !== -1) { 
                os = 'macOS'; 
                link = 'downloadfiles/0.1.0/ticmsg_0.1.0_mac.dmg';
                msg.innerText = os + "용 설치 파일이 준비되었습니다.";
                btn.innerText = os + "용 TicMsg 다운로드";
                btn.href = link;
            } else if (ua.indexOf('linux') !== -1) { 
                os = 'Linux'; 
                link = 'downloadfiles/0.1.0/ticmsg_0.1.0_ubuntu22.deb';
                msg.innerText = os + "용 설치 파일이 준비되었습니다.";
                btn.innerText = os + "용 TicMsg 다운로드";
                btn.href = link;
            }
        }
        window.onload = autoDetect;
    </script>
</body>
</html>
