name: Build and Test Web Server

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        run: |
          cd web
          npm ci

      - name: Smoke test server
        run: |
          cd web
          npm start > server.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:3000/ >/tmp/web-homepage.html
          test -s /tmp/web-homepage.html

      - name: Upload static site preview
        uses: actions/upload-artifact@v4
        with:
          name: web-public
          path: web/public
