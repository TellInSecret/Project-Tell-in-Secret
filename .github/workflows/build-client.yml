name: Build Client

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
          - platform: "ubuntu-22.04"
          - platform: "windows-latest"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Frontend Dependencies
        run: |
          cd client
          npm ci

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd client
          # Windows는 PowerShell 환경이므로 다른 방식의 환경 초기화 필요
          # 타겟 디렉토리 초기화
          if (Test-Path "src-tauri/target") { Remove-Item -Recurse -Force "src-tauri/target" }
          
          # 빌드 실행
          cd src-tauri
          cargo update
          cd ..
          npx tauri build

      - name: Build Tauri App (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd client
          # 모든 환경 변수를 초기화하고 필요한 것만 설정하여 빌드
          # env -i 는 현재 셸의 환경 변수를 모두 지웁니다.
          # 빌드에 꼭 필요한 PATH 등을 복구하면서 실행합니다.
          
          # 이전 타겟 삭제
          rm -rf src-tauri/target
          
          cd src-tauri
          # 깨끗한 환경에서 빌드 실행
          # DYLD_ 및 LD_ 환경 변수를 강제로 unset하고 호출
          env -i PATH="$PATH" HOME="$HOME" GITHUB_TOKEN="$GITHUB_TOKEN" \
          cargo update
          
          env -i PATH="$PATH" HOME="$HOME" GITHUB_TOKEN="$GITHUB_TOKEN" \
          npm run tauri build
          cd ..

      - name: Debug and Upload artifacts
        run: |
          echo "Listing all contents of src-tauri/target:"
          find client/src-tauri/target -name "bundle" -type d || true
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.platform }}
          path: client/src-tauri/target/**/bundle/
          if-no-files-found: warn
