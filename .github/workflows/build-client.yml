name: Build Client

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
          - platform: "macos-13"
          - platform: "ubuntu-22.04"
          - platform: "ubuntu-24.04"
          - platform: "windows-latest"
          - platform: "windows-2019"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Frontend Dependencies
        run: |
          cd client
          npm ci

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_DIR: "target-build"
        run: |
          cd client
          if (Test-Path "src-tauri/target") { Remove-Item -Recurse -Force "src-tauri/target" }
          if (Test-Path "src-tauri/target-build") { Remove-Item -Recurse -Force "src-tauri/target-build" }
          cd src-tauri
          cargo update
          cd ..
          npx tauri build

      - name: Build Tauri App (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DYLD_FALLBACK_LIBRARY_PATH: ""
          LD_LIBRARY_PATH: ""
          CARGO_TARGET_DIR: "target-build"
        run: |
          cd client
          rm -rf src-tauri/target src-tauri/target-build
          cd src-tauri
          cargo update
          cd ..
          npx tauri build
          # 디버깅: 빌드 후 경로 확인
          echo "--- 디버깅: 빌드 결과물 확인 ---"
          find . -name "bundle" -type d
          
      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.platform }}
          path: client/src-tauri/target-build/**/bundle/
          if-no-files-found: warn

      - name: Upload artifacts (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.platform }}
          path: client/src-tauri/target-build/**/bundle/
          if-no-files-found: warn
