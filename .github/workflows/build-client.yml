name: Build Client

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
          - platform: "ubuntu-22.04"
          - platform: "windows-latest"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Frontend Dependencies
        run: |
          cd client
          npm ci

      - name: Build Tauri App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 빌드 프로세스에서 DYLD 환경 변수 비우기
          DYLD_FALLBACK_LIBRARY_PATH: ""
          LD_LIBRARY_PATH: ""
          # Cargo 타겟 경로를 명시하여 오염된 경로 회피
          CARGO_TARGET_DIR: "target-build"
        run: |
          cd client
          # 이전 빌드 흔적 완전 삭제 (범용적인 방식)
          if [ -d "src-tauri/target" ]; then rm -rf src-tauri/target; fi
          if [ -d "src-tauri/target-build" ]; then rm -rf src-tauri/target-build; fi
          # Cargo 정보 갱신
          cd src-tauri
          cargo update
          cd ..
          # Tauri 빌드 실행
          npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.platform }}
          path: client/src-tauri/target-build/release/bundle/
